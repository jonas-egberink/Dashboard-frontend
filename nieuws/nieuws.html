<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Nieuws</title>
  <link rel="stylesheet" href="../shared/theme.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="sidebar"></nav>
  <main class="main">
    <div class="topbar"></div>

    <!-- FILTER BALK -->
    <div class="nieuws-filters mb1">
      <button class="filter-btn active" onclick="setFilter('alles')">Alles</button>
      <button class="filter-btn" onclick="setFilter('portfolio')">Mijn aandelen</button>
      <button class="filter-btn" onclick="setFilter('watchlist')">Watchlist</button>
      <button class="filter-btn sentiment-pos" onclick="setFilter('positief')">📈 Positief</button>
      <button class="filter-btn sentiment-neg" onclick="setFilter('negatief')">📉 Negatief</button>
      <div style="flex:1"></div>
      <button class="btn btn-ghost" onclick="markeerAlles()" style="font-size:.75rem">✓ Alles gelezen</button>
      <button class="btn" onclick="verversen()"><span id="verversen-spin">↻</span> Vernieuwen</button>
    </div>

    <!-- NIEUWS LIJST -->
    <div id="nieuws-container">
      <div class="loader"><span class="spin">⟳</span> Nieuws laden…</div>
    </div>
  </main>

  <script src="../shared/api.js"></script>
  <script src="../shared/app.js"></script>
  <script src="nieuws-app.js"></script>
</body>
</html>

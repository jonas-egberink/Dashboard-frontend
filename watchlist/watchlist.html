<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Watchlist</title>
  <link rel="stylesheet" href="../shared/theme.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="sidebar"></nav>
  <main class="main">
    <div class="topbar"></div>

    <!-- AI AANBEVELINGEN -->
    <div class="card mb1" id="advies-sectie">
      <div class="card-hd">
        <span class="card-title">🤖 AI Portfolio Analyse</span>
        <div style="display:flex;gap:.5rem;align-items:center">
          <span id="advies-tijd" style="font-size:.72rem;color:var(--muted)"></span>
          <button class="btn btn-yellow" onclick="genereerAdvies()" id="advies-knop">✨ Analyseer</button>
        </div>
      </div>
      <div id="advies-container">
        <div style="color:var(--muted);font-size:.85rem;padding:.5rem 0">
          Klik op "Analyseer" voor AI-gedreven portfolio aanbevelingen op basis van jouw posities en marktnieuws.
        </div>
      </div>
      <div style="font-size:.7rem;color:var(--muted);margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)">
        ⚠️ AI-suggesties op basis van publieke data. Geen officieel financieel advies.
      </div>
    </div>

    <!-- WATCHLIST GRID -->
    <div class="card mb1">
      <div class="card-hd">
        <span class="card-title">🔭 Watchlist &amp; Portfolio</span>
        <div style="display:flex;gap:.5rem">
          <span id="bijgewerkt" style="font-size:.72rem;color:var(--muted);align-self:center"></span>
          <button class="btn" onclick="herlaad()">↻ Refresh</button>
        </div>
      </div>
      <div class="watch-grid" id="watch-grid">
        <div class="loader"><span class="spin">⟳</span> Laden…</div>
      </div>
    </div>

    <!-- NIEUW ITEM TOEVOEGEN -->
    <div class="card">
      <div class="card-hd"><span class="card-title">➕ Aandeel toevoegen aan watchlist</span></div>
      <div class="nieuw-form">
        <div class="form-row"><label>Ticker</label><input type="text" id="w-ticker" placeholder="AAPL" style="text-transform:uppercase"/></div>
        <div class="form-row"><label>Reden / notitie</label><input type="text" id="w-reden" placeholder="Waarom interessant?"/></div>
        <div class="form-row"><label>Tags (komma)</label><input type="text" id="w-tags" placeholder="AI, Groei, Tech"/></div>
        <button class="btn btn-yellow" onclick="voegToe()" style="align-self:flex-end;height:38px">+ Toevoegen</button>
      </div>
      <div id="w-fout" class="fout-banner" style="display:none;margin-top:.75rem"></div>
    </div>
  </main>

  <script src="../shared/api.js"></script>
  <script src="../shared/app.js"></script>
  <script src="watchlist-app.js"></script>
</body>
</html>

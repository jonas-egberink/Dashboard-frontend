<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Watchlist</title>
  <link rel="stylesheet" href="../shared/theme.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="sidebar"></nav>
  <main class="main">
    <div class="topbar"></div>

    <!-- AI AANBEVELINGEN -->
    <div class="card mb1" id="advies-sectie">
      <div class="card-hd">
        <span class="card-title">🤖 AI Portfolio Analyse</span>
        <div style="display:flex;gap:.5rem;align-items:center">
          <span id="advies-tijd" style="font-size:.72rem;color:var(--muted)"></span>
          <button class="btn btn-yellow" onclick="genereerAdvies()" id="advies-knop">✨ Analyseer</button>
        </div>
      </div>
      <div id="advies-container">
        <div style="color:var(--muted);font-size:.85rem;padding:.5rem 0">
          Klik op "Analyseer" voor AI-gedreven portfolio aanbevelingen op basis van jouw posities en marktnieuws.
        </div>
      </div>
      <div style="font-size:.7rem;color:var(--muted);margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)">
        ⚠️ AI-suggesties op basis van publieke data. Geen officieel financieel advies.
      </div>
    </div>

    <!-- WATCHLIST GRID -->
    <div class="card mb1">
      <div class="card-hd">
        <span class="card-title">🔭 Watchlist &amp; Portfolio</span>
        <div style="display:flex;gap:.5rem">
          <span id="bijgewerkt" style="font-size:.72rem;color:var(--muted);align-self:center"></span>
          <button class="btn" onclick="herlaad()">↻ Refresh</button>
        </div>
      </div>
      <div class="watch-grid" id="watch-grid">
        <div class="loader"><span class="spin">⟳</span> Laden…</div>
      </div>
    </div>

    <!-- NIEUW ITEM TOEVOEGEN -->
    <div class="card">
      <div class="card-hd"><span class="card-title">➕ Aandeel toevoegen aan watchlist</span></div>
      <div class="nieuw-form">
        <div class="form-row"><label>Ticker</label><input type="text" id="w-ticker" placeholder="AAPL" style="text-transform:uppercase"/></div>
        <div class="form-row"><label>Reden / notitie</label><input type="text" id="w-reden" placeholder="Waarom interessant?"/></div>
        <div class="form-row"><label>Tags (komma)</label><input type="text" id="w-tags" placeholder="AI, Groei, Tech"/></div>
        <button class="btn btn-yellow" onclick="voegToe()" style="align-self:flex-end;height:38px">+ Toevoegen</button>
      </div>
      <div id="w-fout" class="fout-banner" style="display:none;margin-top:.75rem"></div>
    </div>
  </main>

  <script src="../shared/api.js"></script>
  <script src="../shared/app.js"></script>
  <script>
    let watchItems = {};
    let _portfolioActief = [];

    async function herlaad() {
      try {
        // Watchlist items ophalen
        watchItems = await api.getPaginaData('watchlist') || {};

        // Portfolio aandelen ophalen — automatisch tonen
        const portfolio = await api.getPortfolio();
        _portfolioActief = (portfolio?.posities || []).filter(p => p.aantalAandelen > 0);

        // Portfolio aandelen als virtuele watchlist items toevoegen
        _portfolioActief.forEach(p => {
          const key = '__portfolio__' + p.ticker;
          if (!watchItems[key]) {
            watchItems[key] = {
              ticker:      p.ticker,
              naam:        p.naam,
              reden:       'In portfolio — ' + p.rekening,
              tags:        'Portfolio',
              isPortfolio: true,
              exchange:    p.exchange,
              valuta:      p.valuta,
            };
          }
        });

        // Live koersen ophalen voor alle items
        const tickers = [...new Set(Object.values(watchItems).map(w => w.ticker).filter(Boolean))];
        const koersen = {};
        await Promise.allSettled(tickers.map(async t => {
          try {
            const info = await api.zoekAandeel(t);
            if (info?.gevonden) koersen[t] = info;
          } catch {}
        }));

        renderGrid(koersen);
        document.getElementById('bijgewerkt').textContent = 'Live · ' + new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      } catch(e) { console.error(e); }
    }

    function renderGrid(koersen) {
      const grid  = document.getElementById('watch-grid');
      const items = Object.entries(watchItems);
      if (!items.length) {
        grid.innerHTML = '<div class="leeg" style="grid-column:1/-1">Geen aandelen op je watchlist.</div>';
        return;
      }

      // Portfolio positie map voor extra info
      const portMap = {};
      _portfolioActief.forEach(p => { portMap[p.ticker] = p; });

      grid.innerHTML = items.map(([sleutel, w]) => {
        const k      = koersen[w.ticker] || {};
        const tags   = (w.tags || '').split(',').map(t => t.trim()).filter(Boolean);
        // dagWijzigingPct is al een percentage bij Yahoo Finance v3 — GEEN *100
        const dagPct = k.wijzigingPct ?? null;
        const port   = portMap[w.ticker];
        const isPort = !!w.isPortfolio;

        return `
          <div class="watch-card${isPort ? ' portfolio-kaart' : ''}"
               onclick="window.open('https://finance.yahoo.com/quote/${w.ticker}','_blank')">
            <div class="w-header">
              <div>
                <div class="w-ticker">
                  ${w.ticker}
                  ${isPort ? '<span style="font-size:.6rem;background:rgba(99,102,241,.2);color:var(--accent);padding:.1rem .35rem;border-radius:4px;margin-left:.3rem">portfolio</span>' : ''}
                </div>
                <div class="w-naam">${k.naam || w.naam || w.ticker}</div>
              </div>
              <div style="text-align:right">
                <div class="w-prijs">${k.prijs != null ? '€' + fmt(k.prijs) : '–'}</div>
                ${dagPct != null
                  ? `<div class="w-wijziging ${kleur(dagPct)}">${dagPct >= 0 ? '+' : ''}${fmt(dagPct, 2)}% vandaag</div>`
                  : ''}
              </div>
            </div>
            ${port ? `
              <div style="font-size:.72rem;color:var(--muted);margin-bottom:.4rem;display:flex;gap:.75rem">
                <span>€${fmt(port.marktWaarde)} waarde</span>
                <span class="${kleur(port.ongrealiseerdGV)}">${port.ongrealiseerdGV >= 0 ? '+' : ''}€${fmt(port.ongrealiseerdGV)} ongerealiseerd</span>
              </div>` : ''}
            <div class="w-reden">${w.reden || ''}</div>
            <div class="w-tags">${tags.map(t => `<span class="w-tag ${t.toLowerCase()}">${t}</span>`).join('')}</div>
            <div class="w-footer">
              <span style="font-size:.72rem;color:var(--muted)">${k.exchange || ''} · ${k.valuta || ''}</span>
              ${!isPort
                ? `<button class="btn btn-red" style="padding:.2rem .5rem;font-size:.72rem"
                     onclick="event.stopPropagation();verwijder('${sleutel}')">✕ Verwijder</button>`
                : ''}
            </div>
          </div>`;
      }).join('');
    }

    async function voegToe() {
      const fout   = document.getElementById('w-fout');
      fout.style.display = 'none';
      const ticker = document.getElementById('w-ticker').value.trim().toUpperCase();
      const reden  = document.getElementById('w-reden').value.trim();
      const tags   = document.getElementById('w-tags').value.trim();
      if (!ticker) { fout.textContent = 'Vul een ticker in.'; fout.style.display = 'block'; return; }
      try {
        const info = await api.zoekAandeel(ticker);
        if (!info?.gevonden) {
          fout.textContent = `Ticker "${ticker}" niet gevonden.`;
          fout.style.display = 'block';
          return;
        }
        const sleutel = ticker.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
        await api.slaOp('watchlist', sleutel, {
          ticker, naam: info.naam, reden, tags,
          exchange: info.exchange, valuta: info.valuta,
          toegevoegd: new Date().toISOString(),
        });
        document.getElementById('w-ticker').value = '';
        document.getElementById('w-reden').value  = '';
        document.getElementById('w-tags').value   = '';
        await herlaad();
      } catch(e) { fout.textContent = e.message; fout.style.display = 'block'; }
    }

    async function verwijder(sleutel) {
      if (!confirm('Verwijderen van watchlist?')) return;
      try { await api.verwijderItem('watchlist', sleutel); await herlaad(); }
      catch(e) { alert(e.message); }
    }

    // ── AI ADVIES ──────────────────────────────────────────────
    async function genereerAdvies() {
      const container = document.getElementById('advies-container');
      const knop      = document.getElementById('advies-knop');
      knop.disabled   = true;
      knop.textContent = '⏳ Analyseren…';
      container.innerHTML = '<div class="loader"><span class="spin">⟳</span> AI analyseert je portfolio…</div>';

      try {
        const resultaat = await api.genereerAdvies();
        if (!resultaat) {
          container.innerHTML = '<div class="leeg">Geen advies beschikbaar. Voeg eerst aandelen toe.</div>';
          return;
        }

        const advies = resultaat.advies || resultaat;
        document.getElementById('advies-tijd').textContent =
          'Gegenereerd: ' + new Date(resultaat.gegenereerd).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });

        const risicoKleur = { 'LAAG': 'green', 'MIDDEL': 'orange', 'HOOG': 'red' };
        const actieKleur  = { 'KOPEN': 'btn-green', 'HOUDEN': 'btn-ghost', 'VERMINDEREN': 'btn-yellow', 'VERKOPEN': 'btn-red' };

        container.innerHTML = `
          <div class="advies-samenvatting">${advies.samenvatting || ''}</div>
          ${advies.diversificatie ? `<div style="font-size:.82rem;color:var(--muted);margin-bottom:.75rem">${advies.diversificatie}</div>` : ''}
          ${(advies.risicos || []).length ? `
            <div class="advies-waarschuwingen">
              ${advies.risicos.map(r => `<div class="waarschuwing">⚠️ ${r}</div>`).join('')}
            </div>` : ''}
          <div class="advies-grid">
            ${(advies.aanbevelingen || []).map(a => `
              <div class="advies-kaart">
                <div class="advies-kaart-header">
                  <div>
                    <span class="ticker">${a.ticker || '–'}</span>
                    <span style="font-size:.78rem;color:var(--muted);margin-left:.35rem">${a.naam || ''}</span>
                  </div>
                  <div style="display:flex;gap:.35rem;align-items:center;flex-shrink:0">
                    <span style="font-size:.65rem;color:var(--${risicoKleur[a.risico] || 'muted'})">${a.risico || ''}</span>
                    <button class="btn ${actieKleur[a.actie] || 'btn'}"
                            style="padding:.15rem .5rem;font-size:.7rem;pointer-events:none">${a.actie || ''}</button>
                  </div>
                </div>
                <div class="advies-actie">${a.reden || ''}</div>
                <div class="advies-termijn">📅 ${a.tijdshorizon || ''}</div>
              </div>`).join('')}
          </div>`;
      } catch(e) {
        container.innerHTML = `<div class="fout-banner">Analyse mislukt: ${e.message}</div>`;
      } finally {
        knop.disabled    = false;
        knop.textContent = '✨ Analyseer';
      }
    }

    async function laadGeheugendAdvies() {
      try {
        const resultaat = await api.getAdvies();
        if (resultaat?.advies?.samenvatting) {
          document.getElementById('advies-tijd').textContent =
            'Gegenereerd: ' + new Date(resultaat.gegenereerd).toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
          document.getElementById('advies-container').innerHTML = `
            <div class="advies-samenvatting">${resultaat.advies.samenvatting}</div>
            <div style="margin-top:.5rem">
              <button class="btn btn-ghost" onclick="genereerAdvies()">Toon volledige analyse →</button>
            </div>`;
        }
      } catch {}
    }

    document.getElementById('w-ticker')?.addEventListener('keydown', e => { if (e.key === 'Enter') voegToe(); });

    document.addEventListener('DOMContentLoaded', () => {
      dashboardInit({ actief: 'Watchlist', titel: 'Watchlist' });
      herlaad();
      laadGeheugendAdvies();
      setInterval(herlaad, 2 * 60 * 1000);
    });
  </script>
</body>
</html>

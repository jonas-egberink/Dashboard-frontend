<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Login</title>
  <link rel="stylesheet" href="../shared/theme.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div class="login-box">
    <div class="login-logo"><div class="login-logo-dot"></div><span>Dashboard</span></div>
    <div class="tabs">
      <button class="tab active" onclick="toonTab('login')">Inloggen</button>
      <button class="tab" onclick="toonTab('registreer')">Registreren</button>
    </div>
    <div id="fout" class="fout-banner" style="display:none"></div>
    <div class="form-row"><label>Email</label><input type="email" id="email" placeholder="jij@email.com"/></div>
    <div id="naam-rij" class="form-row" style="display:none"><label>Naam</label><input type="text" id="naam" placeholder="Voornaam"/></div>
    <div class="form-row"><label>Wachtwoord</label><input type="password" id="ww" placeholder="••••••••"/></div>
    <button class="btn btn-green" style="width:100%;justify-content:center;padding:.75rem;font-size:.95rem;margin-top:.5rem" onclick="verstuur()">
      <span id="knop-tekst">Inloggen</span>
    </button>
  </div>
  <script src="api.js"></script>
  <script>
    const API_URL = 'https://jouw-backend.railway.app';
    const api = {
      getToken:  () => localStorage.getItem('db_token'),
      setToken:  (t) => localStorage.setItem('db_token', t),
      isLoggedIn:() => !!localStorage.getItem('db_token'),
      async _fetch(pad, opts = {}) {
        const t = this.getToken();
        const r = await fetch(API_URL + pad, { ...opts, headers: { 'Content-Type': 'application/json', ...(t ? { Authorization: 'Bearer ' + t } : {}) } });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || 'Fout');
        return d;
      },
      async login(e, w)       { const d = await this._fetch('/api/auth/login',      { method: 'POST', body: JSON.stringify({ email: e, wachtwoord: w }) });    this.setToken(d.token); return d.gebruiker; },
      async registreer(e, w, n) { const d = await this._fetch('/api/auth/registreer', { method: 'POST', body: JSON.stringify({ email: e, wachtwoord: w, naam: n }) }); this.setToken(d.token); return d.gebruiker; },
    };

    if (api.isLoggedIn()) window.location.href = '../home/index.html';

    let modus = 'login';

    function toonTab(t) {
      modus = t;
      document.querySelectorAll('.tab').forEach((b, i) => b.classList.toggle('active', (i === 0) === (t === 'login')));
      document.getElementById('naam-rij').style.display = t === 'registreer' ? 'block' : 'none';
      document.getElementById('knop-tekst').textContent = t === 'login' ? 'Inloggen' : 'Account aanmaken';
      document.getElementById('fout').style.display = 'none';
    }

    document.getElementById('ww').addEventListener('keydown', e => { if (e.key === 'Enter') verstuur(); });

    async function verstuur() {
      const f = document.getElementById('fout');
      f.style.display = 'none';
      const e = document.getElementById('email').value.trim();
      const w = document.getElementById('ww').value;
      const n = document.getElementById('naam').value.trim();
      if (!e || !w) { f.textContent = 'Vul email en wachtwoord in.'; f.style.display = 'block'; return; }
      try {
        if (modus === 'login') await api.login(e, w);
        else await api.registreer(e, w, n);
        window.location.href = '../home/index.html';
      } catch (err) { f.textContent = err.message; f.style.display = 'block'; }
    }
  </script>
</body>
</html>

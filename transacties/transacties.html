<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Transacties</title>
  <link rel="stylesheet" href="../shared/theme.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <nav class="sidebar"></nav>
  <main class="main">
    <div class="topbar"></div>
    <div class="card">
      <div class="card-hd"><span class="card-title">🔄 Alle Transacties</span><span id="tx-count" style="font-size:.78rem;color:var(--muted)"></span></div>
      <div class="filter-balk">
        <div class="form-row"><label>Aandeel</label><select id="f-aandeel"><option value="">Alles</option></select></div>
        <div class="form-row"><label>Type</label><select id="f-type"><option value="">Alles</option><option value="Buy">Koop</option><option value="Sell">Verkoop</option></select></div>
        <div class="form-row"><label>Van</label><input type="date" id="f-van"/></div>
        <div class="form-row"><label>Tot</label><input type="date" id="f-tot"/></div>
        <button class="btn" onclick="herlaad()" style="align-self:flex-end">↻ Filter</button>
        <button class="btn btn-ghost" onclick="resetFilter()" style="align-self:flex-end">✕ Reset</button>
      </div>
      <table>
        <thead><tr><th>Datum</th><th>Type</th><th>Ticker</th><th>Naam</th><th>Stuks</th><th>Prijs/stuk</th><th>Fees</th><th>Totaal</th><th>Notitie</th><th></th></tr></thead>
        <tbody id="tx-tbody"><tr><td colspan="10" class="loader"><span class="spin">⟳</span> Laden…</td></tr></tbody>
      </table>
    </div>
  </main>

  <script src="../shared/api.js"></script>
  <script src="../shared/app.js"></script>
  <script src="transacties-app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Financieel</title>
  <link rel="stylesheet" href="../shared/theme.css"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    /* REKENING GROEPEN */
    .rekening-blok { margin-bottom: 1.5rem; }
    .rekening-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: .6rem 1rem; background: var(--card2);
      border: 1px solid var(--border); border-radius: 10px 10px 0 0;
      cursor: pointer; user-select: none;
    }
    .rekening-header:hover { background: var(--border); }
    .rekening-naam { font-weight: 700; font-size: .9rem; display: flex; align-items: center; gap: .6rem; }
    .rekening-pijl { font-size: .75rem; color: var(--muted); transition: transform .2s; }
    .rekening-pijl.open { transform: rotate(90deg); }
    .rekening-stats { display: flex; gap: 1.5rem; font-size: .82rem; }
    .rekening-stat { text-align: right; }
    .rekening-stat-label { color: var(--muted); font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; }
    .rekening-stat-val { font-weight: 700; }
    .rekening-tabel-wrap { border: 1px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; overflow: hidden; }
    .rekening-tabel-wrap.verborgen { display: none; }

    /* TOTAAL RIJEN */
    .totaal-rij td { background: var(--card2); font-weight: 600; border-top: 2px solid var(--border); }

    /* NIEUW AANDEEL */
    .nieuw-aandeel-rij { display: flex; gap: .5rem; align-items: flex-end; flex-wrap: wrap; }
    .nieuw-aandeel-rij .form-row { margin: 0; flex: 1; min-width: 140px; }
    .zoek-resultaat { display: none; background: var(--card2); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; margin-top: .5rem; }

    /* DETAIL SECTIE */
    .periode-btns { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .periode-btn { background: var(--card2); border: 1px solid var(--border); border-radius: 6px; padding: .3rem .75rem; font-size: .75rem; color: var(--muted); cursor: pointer; font-family: var(--font); transition: all .15s; }
    .periode-btn.active { background: rgba(99,102,241,.15); color: var(--accent); border-color: rgba(99,102,241,.4); }
  </style>
</head>
<body>
  <nav class="sidebar"></nav>
  <main class="main">
    <div class="topbar"></div>

    <!-- TOTAAL STATS -->
    <div class="g3 mb2" id="fin-stats"></div>

    <!-- REKENINGEN OVERZICHT -->
    <div id="rekeningen-container">
      <div class="loader"><span class="spin">⟳</span> Laden…</div>
    </div>

    <!-- DETAIL SECTIE -->
    <div id="detail-sectie" style="display:none" class="card mb1">
      <div class="card-hd">
        <span class="card-title" id="detail-titel">Aankopen</span>
        <button class="btn btn-ghost" onclick="sluitDetail()">✕ Sluiten</button>
      </div>
      <div class="periode-btns">
        <button class="periode-btn active" onclick="setPeriode('alles')">Alles</button>
        <button class="periode-btn" onclick="setPeriode('week')">Deze week</button>
        <button class="periode-btn" onclick="setPeriode('maand')">Deze maand</button>
        <button class="periode-btn" onclick="setPeriode('jaar')">Dit jaar</button>
      </div>
      <div class="g3 mb1" id="detail-stats"></div>
      <table>
        <thead><tr><th>Datum</th><th>Type</th><th>Stuks</th><th>Prijs/stuk</th><th>Fees</th><th>Totaal</th><th>Notitie</th><th></th></tr></thead>
        <tbody id="aankopen-tbody"></tbody>
      </table>
    </div>

    <!-- NIEUW AANDEEL TOEVOEGEN -->
    <div class="card">
      <div class="card-hd"><span class="card-title">➕ Nieuw Aandeel Toevoegen</span></div>
      <div class="nieuw-aandeel-rij">
        <div class="form-row"><label>Ticker</label><input type="text" id="nieuw-ticker" placeholder="AAPL of AMS:VUSA" style="text-transform:uppercase"/></div>
        <div class="form-row"><label>Rekening</label><input type="text" id="nieuw-rekening" placeholder="bijv. DEGIRO" list="rekening-lijst"/><datalist id="rekening-lijst"></datalist></div>
        <button class="btn btn-yellow" onclick="zoekTicker()" style="align-self:flex-end;height:38px">🔍 Zoeken</button>
      </div>
      <div class="zoek-resultaat" id="zoek-resultaat"></div>
    </div>
  </main>

  <script src="../shared/api.js"></script>
  <script src="../shared/app.js"></script>
  <script>
    let _posities = [], _rekeningen = [], _huidigAandeel = null, _periode = 'alles';

    async function herlaad() {
      try {
        const data = await api.getPortfolio();
        _posities   = data.posities   || [];
        _rekeningen = data.rekeningen || [];
        renderStats(data.totalen);
        renderRekeningen(_rekeningen);
        updateRekeningDatalist();
        document.getElementById('koers-tijd')?.replaceChildren(
          document.createTextNode('Live · ' + new Date().toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit'}))
        );
        if (_huidigAandeel) laadDetail(_huidigAandeel);
      } catch(e) { console.error(e); }
    }

    function renderStats(t) {
      const rendement = t.totaleKost > 0 ? (t.ongrealiseerdGV / t.totaleKost * 100).toFixed(1) + '%' : '–';
      document.getElementById('fin-stats').innerHTML = `
        <div class="card"><div class="card-hd"><span class="card-title">Totale Waarde</span><span id="koers-tijd" style="font-size:.72rem;color:var(--muted)"></span></div><div class="stat-val">€${fmt(t.portfolioWaarde)}</div><div class="stat-sub">Alle actieve posities</div></div>
        <div class="card"><div class="card-hd"><span class="card-title">Ongerealiseerd</span></div><div class="stat-val ${kleur(t.ongrealiseerdGV)}">${fmtBedrag(t.ongrealiseerdGV,true)}</div><div class="stat-sub">${rendement} rendement</div></div>
        <div class="card"><div class="card-hd"><span class="card-title">Gerealiseerd</span></div><div class="stat-val ${kleur(t.grealiseerdGV)}">${fmtBedrag(t.grealiseerdGV,true)}</div><div class="stat-sub">Alle afgesloten posities</div></div>`;
    }

    function renderRekeningen(rekeningen) {
      const container = document.getElementById('rekeningen-container');
      if (!rekeningen.length) {
        container.innerHTML = '<div class="leeg">Geen aandelen gevonden. Voeg er een toe hieronder.</div>';
        return;
      }

      container.innerHTML = rekeningen.map(r => `
        <div class="rekening-blok">
          <div class="rekening-header" onclick="toggleRekening('${r.naam}')">
            <div class="rekening-naam">
              <span class="rekening-pijl open" id="pijl-${r.naam.replace(/\s/g,'_')}">▶</span>
              🏦 ${r.naam}
              <span style="font-size:.72rem;color:var(--muted);font-weight:400">${r.totalen.aantalAandelen} positie${r.totalen.aantalAandelen !== 1 ? 's' : ''}</span>
            </div>
            <div class="rekening-stats">
              <div class="rekening-stat">
                <div class="rekening-stat-label">Waarde</div>
                <div class="rekening-stat-val">€${fmt(r.totalen.portfolioWaarde)}</div>
              </div>
              <div class="rekening-stat">
                <div class="rekening-stat-label">Ongerealiseerd</div>
                <div class="rekening-stat-val ${kleur(r.totalen.ongrealiseerdGV)}">${fmtBedrag(r.totalen.ongrealiseerdGV,true)}</div>
              </div>
              <div class="rekening-stat">
                <div class="rekening-stat-label">Gerealiseerd</div>
                <div class="rekening-stat-val ${kleur(r.totalen.grealiseerdGV)}">${fmtBedrag(r.totalen.grealiseerdGV,true)}</div>
              </div>
              <div class="rekening-stat">
                <div class="rekening-stat-label">Totaal G/V</div>
                <div class="rekening-stat-val ${kleur(r.totalen.totaalGV)}">${fmtBedrag(r.totalen.totaalGV,true)}</div>
              </div>
            </div>
          </div>
          <div class="rekening-tabel-wrap" id="tabel-${r.naam.replace(/\s/g,'_')}">
            <table>
              <thead><tr><th></th><th>Ticker</th><th>Naam</th><th>Stuks</th><th>Gem. kost</th><th>Koers</th><th>Waarde</th><th>Ongerealiseerd</th><th>Gerealiseerd</th><th>Dag</th></tr></thead>
              <tbody>
                ${r.posities.map(p => `
                  <tr style="cursor:pointer" onclick="toggleDetail('${p.id}','${p.ticker}','${p.naam}')">
                    <td style="color:var(--muted);font-size:.7rem">${p.aantalAandelen>0?'●':''}</td>
                    <td><span class="ticker">${p.ticker}</span></td>
                    <td style="font-size:.82rem;color:var(--muted)">${p.naam}</td>
                    <td>${p.aantalAandelen>0 ? fmt(p.aantalAandelen,4) : '–'}</td>
                    <td>${p.aantalAandelen>0 ? '€'+fmt(p.gemiddeldeKostprijs) : '–'}</td>
                    <td>${p.huidigePrijs!=null ? '€'+fmt(p.huidigePrijs) : '–'}</td>
                    <td>${p.aantalAandelen>0 ? '€'+fmt(p.marktWaarde) : '–'}</td>
                    <td class="${kleur(p.ongrealiseerdGV)}">${p.aantalAandelen>0 ? fmtBedrag(p.ongrealiseerdGV,true)+' ('+fmt(p.ongrealiseerdPct*100,1)+'%)' : '–'}</td>
                    <td class="${kleur(p.grealiseerdGV)}">${p.grealiseerdGV!==0 ? fmtBedrag(p.grealiseerdGV,true) : '–'}</td>
                    <td class="${kleur(p.dagWijziging??0)}">${p.dagWijzigingPct!=null ? (p.dagWijzigingPct>=0?'+':'')+fmt(p.dagWijzigingPct,2)+'%' : '–'}</td>
                  </tr>`).join('')}
              </tbody>
            </table>
          </div>
        </div>`).join('');
    }

    function toggleRekening(naam) {
      const sleutel = naam.replace(/\s/g, '_');
      const tabel = document.getElementById('tabel-' + sleutel);
      const pijl  = document.getElementById('pijl-' + sleutel);
      if (!tabel) return;
      const open = !tabel.classList.contains('verborgen');
      tabel.classList.toggle('verborgen', open);
      pijl.classList.toggle('open', !open);
    }

    function updateRekeningDatalist() {
      const namen = [...new Set(_rekeningen.map(r => r.naam))];
      const list  = document.getElementById('rekening-lijst');
      if (list) list.innerHTML = namen.map(n => `<option value="${n}">`).join('');
    }

    // DETAIL
    async function toggleDetail(id, ticker, naam) {
      if (_huidigAandeel === id) { sluitDetail(); return; }
      _huidigAandeel = id;
      _periode = 'alles';
      document.querySelectorAll('.periode-btn').forEach((b,i) => b.classList.toggle('active', i===0));
      document.getElementById('detail-titel').textContent = `Aankopen — ${ticker} (${naam})`;
      document.getElementById('detail-sectie').style.display = 'block';
      document.getElementById('detail-sectie').scrollIntoView({ behavior:'smooth', block:'nearest' });
      await laadDetail(id);
    }

    async function laadDetail(aandeelId) {
      document.getElementById('aankopen-tbody').innerHTML = '<tr><td colspan="8" class="loader"><span class="spin">⟳</span> Laden…</td></tr>';
      try {
        // Gebruik aandeel_id filter direct
        const alle = await api.getTransacties({ aandeel_id: aandeelId });
        const gefilterd = filterPeriode(alle, _periode);
        renderDetailStats(gefilterd);
        renderAankopen(gefilterd);
      } catch(e) { console.error(e); }
    }

    function filterPeriode(txs, periode) {
      const nu = new Date();
      if (periode==='week')  { const d=new Date(nu); d.setDate(d.getDate()-7); return txs.filter(t=>t.datum>=d.toISOString().split('T')[0]); }
      if (periode==='maand') { const d=new Date(nu.getFullYear(),nu.getMonth(),1); return txs.filter(t=>t.datum>=d.toISOString().split('T')[0]); }
      if (periode==='jaar')  { return txs.filter(t=>t.datum>=(nu.getFullYear()+'-01-01')); }
      return txs;
    }

    function renderDetailStats(txs) {
      const gekocht  = txs.filter(t=>t.type==='Buy').reduce((s,t)=>s+t.aantal*t.prijs+t.fees,0);
      const verkocht = txs.filter(t=>t.type==='Sell').reduce((s,t)=>s+t.aantal*t.prijs-t.fees,0);
      document.getElementById('detail-stats').innerHTML = `
        <div class="card"><div class="card-title">Totaal gekocht</div><div class="stat-val">€${fmt(gekocht)}</div><div class="stat-sub">${txs.filter(t=>t.type==='Buy').length} aankopen</div></div>
        <div class="card"><div class="card-title">Totaal verkocht</div><div class="stat-val">€${fmt(verkocht)}</div><div class="stat-sub">${txs.filter(t=>t.type==='Sell').length} verkopen</div></div>
        <div class="card"><div class="card-title">Transacties</div><div class="stat-val">${txs.length}</div><div class="stat-sub">In geselecteerde periode</div></div>`;
    }

    function renderAankopen(txs) {
      document.getElementById('aankopen-tbody').innerHTML = txs.length ? txs.map(t=>`
        <tr>
          <td>${t.datum}</td>
          <td><span class="badge badge-${t.type==='Buy'?'buy':'sell'}">${t.type==='Buy'?'🟢 Koop':'🔴 Verkoop'}</span></td>
          <td>${fmt(t.aantal,4)}</td>
          <td>€${fmt(t.prijs)}</td>
          <td>€${fmt(t.fees)}</td>
          <td>€${fmt(t.totaal)}</td>
          <td style="color:var(--muted);font-size:.8rem">${t.notitie||'–'}</td>
          <td style="display:flex;gap:.3rem">
            <button class="btn btn-ghost" style="padding:.2rem .5rem;font-size:.72rem" onclick="openBewerkModal('${t.id}','${t.aandeel_id}','${t.type}','${t.datum}',${t.aantal},${t.prijs},${t.fees},'${t.notitie||''}')">✏️</button>
            <button class="btn btn-red" style="padding:.2rem .5rem;font-size:.72rem" onclick="verwijderTx('${t.id}')">✕</button>
          </td>
        </tr>`).join('') : '<tr><td colspan="8" class="leeg">Geen transacties in deze periode</td></tr>';
    }

    function setPeriode(p) {
      _periode = p;
      document.querySelectorAll('.periode-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().includes(p==='alles'?'alles':p==='week'?'week':p==='maand'?'maand':'jaar')));
      if (_huidigAandeel) laadDetail(_huidigAandeel);
    }

    function sluitDetail() { _huidigAandeel=null; document.getElementById('detail-sectie').style.display='none'; }

    async function verwijderTx(id) {
      if (!confirm('Transactie verwijderen?')) return;
      try { await api.verwijderTransactie(id); await herlaad(); } catch(e) { alert(e.message); }
    }

    function openBewerkModal(id, aandeelId, type, datum, aantal, prijs, fees, notitie) {
      document.getElementById('bewerk-modal')?.remove();
      document.body.insertAdjacentHTML('beforeend', `
        <div class="modal-overlay open" id="bewerk-modal">
          <div class="modal" onclick="event.stopPropagation()">
            <h2>✏️ Transactie aanpassen</h2>
            <div class="form-grid">
              <div class="form-row"><label>Type</label>
                <select id="bw-type">
                  <option value="Buy" ${type==='Buy'?'selected':''}>🟢 Koop</option>
                  <option value="Sell" ${type==='Sell'?'selected':''}>🔴 Verkoop</option>
                </select>
              </div>
              <div class="form-row"><label>Datum</label><input type="date" id="bw-datum" value="${datum}"/></div>
            </div>
            <div class="form-grid">
              <div class="form-row"><label>Aantal stuks</label><input type="number" id="bw-aantal" value="${aantal}" min="0.000001" step="any"/></div>
              <div class="form-row"><label>Prijs per stuk</label><input type="number" id="bw-prijs" value="${prijs}" min="0" step="any"/></div>
            </div>
            <div class="form-row"><label>Fees</label><input type="number" id="bw-fees" value="${fees}" min="0" step="0.01"/></div>
            <div class="form-row"><label>Notitie</label><input type="text" id="bw-notitie" value="${notitie}"/></div>
            <div id="bw-fout" class="fout-banner" style="display:none;margin-top:.75rem"></div>
            <div class="modal-actions">
              <button class="btn-cancel" onclick="document.getElementById('bewerk-modal').remove()">Annuleren</button>
              <button class="btn btn-green" onclick="slaaBewerkingOp('${id}')">✓ Opslaan</button>
            </div>
          </div>
        </div>`);
      document.getElementById('bewerk-modal').addEventListener('click', e => {
        if (e.target.id === 'bewerk-modal') document.getElementById('bewerk-modal').remove();
      });
    }

    async function slaaBewerkingOp(id) {
      const fout = document.getElementById('bw-fout');
      fout.style.display = 'none';
      const payload = {
        type:    document.getElementById('bw-type').value,
        datum:   document.getElementById('bw-datum').value,
        aantal:  parseFloat(document.getElementById('bw-aantal').value),
        prijs:   parseFloat(document.getElementById('bw-prijs').value),
        fees:    parseFloat(document.getElementById('bw-fees').value) || 0,
        notitie: document.getElementById('bw-notitie').value || null,
      };
      try {
        await api.pasTransactieAan(id, payload);
        document.getElementById('bewerk-modal').remove();
        await herlaad();
      } catch(e) { fout.textContent = e.message; fout.style.display = 'block'; }
    }

    // NIEUW AANDEEL
    async function zoekTicker() {
      const ticker   = document.getElementById('nieuw-ticker').value.trim().toUpperCase();
      const rekening = document.getElementById('nieuw-rekening').value.trim() || 'Standaard';
      if (!ticker) return;
      const res = document.getElementById('zoek-resultaat');
      res.style.display='block'; res.innerHTML='<span class="spin">⟳</span> Zoeken op Yahoo Finance…';
      try {
        const info = await api.zoekAandeel(ticker);
        if (!info.gevonden) { res.innerHTML=`<span style="color:var(--red)">❌ "${ticker}" niet gevonden. Probeer de Yahoo Finance ticker (bijv. VUSA.AS)</span>`; return; }
        res.innerHTML=`
          <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">
            <div>
              <strong>${info.ticker}</strong> — ${info.naam}<br>
              <span style="font-size:.78rem;color:var(--muted)">${info.exchange} · ${info.valuta} · Prijs: ${info.prijs!=null?'€'+fmt(info.prijs):'onbekend'}</span>
            </div>
            <div style="display:flex;align-items:center;gap:.5rem">
              <span style="font-size:.8rem;color:var(--muted)">Rekening:</span>
              <strong>${rekening}</strong>
              <button class="btn btn-green" onclick="voegToe('${info.ticker}','${rekening}')">+ Toevoegen</button>
            </div>
          </div>`;
      } catch(e) { res.innerHTML=`<span style="color:var(--red)">Fout: ${e.message}</span>`; }
    }

    async function voegToe(ticker, rekening) {
      try {
        await api.voegAandeelToe(ticker, rekening);
        document.getElementById('nieuw-ticker').value   = '';
        document.getElementById('nieuw-rekening').value = '';
        document.getElementById('zoek-resultaat').style.display = 'none';
        await herlaad();
      } catch(e) { alert(e.message); }
    }

    document.getElementById('nieuw-ticker')?.addEventListener('keydown', e => { if(e.key==='Enter') zoekTicker(); });

    document.addEventListener('DOMContentLoaded', () => {
      dashboardInit({ actief:'Financieel', titel:'Financieel', extra: `<button class="btn" onclick="herlaad()">↻ Refresh</button>` });
      herlaad();
      setInterval(herlaad, 2*60*1000);
    });
  </script>
</body>
</html>
